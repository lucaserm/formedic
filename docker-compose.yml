volumes:
  postgres-data:

networks:
  postgres-net:

services:
  # * ---------------------------------------------------------------------------
  # * app
  # * ---------------------------------------------------------------------------

  app:
    env_file:
      - .env.test
    build:
      context: .
      dockerfile: dockerfile
      target: production
    networks:
      - postgres-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --tries=1 --spider http://0.0.0.0:${PORT} || exit 1",
        ]
      interval: 5s
      timeout: 10s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      tests:
        condition: service_completed_successfully

  # * ---------------------------------------------------------------------------
  # * tests
  # * ---------------------------------------------------------------------------

  tests:
    env_file:
      - .env.test
    build:
      context: .
      dockerfile: dockerfile
      target: test
    networks:
      - postgres-net
    depends_on:
      postgres:
        condition: service_healthy

  # * ---------------------------------------------------------------------------
  # * postgres
  # * ---------------------------------------------------------------------------

  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - postgres-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
